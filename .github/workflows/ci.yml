name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5  # ← FIX: v4 → v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check synapse/ tests/ --fix
          ruff format synapse/ tests/

      - name: Run tests
        run: |
          pytest --cov=synapse --cov-report=xml --cov-report=term-missing -v \
            --ignore=tests/test_embeddings_unixcoder.py \
            --ignore=tests/test_chunking_treesitter.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5  # ← FIX: v4 → v5 (usa upload-artifact@v4)
        with:
          file: ./coverage.xml
          flags: unittests
        continue-on-error: true  # ← FIX: não falha pipeline se codecov down

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety

      - name: Security scan
        run: bandit -r synapse/ -f json -o bandit-report.json || true

      - name: Dependency check
        run: safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  deploy:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Authenticate with Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci


      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          # Try using existing SSH profile
          if ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo 'SSH connection successful'"; then
            echo "✅ SSH connection established, starting deployment..."
            ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
              set -e
              echo 'Starting deployment to production server...'
              cd /opt/synapse
              sudo -u synapse git fetch origin main
              sudo -u synapse git reset --hard origin/main
              sudo -u synapse /opt/synapse/venv/bin/pip install -r requirements.txt
              sudo systemctl restart synapse-server
              sleep 10
              curl -sf http://localhost:8000/health || exit 1
              echo 'Deployment completed successfully!'
            "
          else
            echo "❌ SSH connection still blocked by Tailscale policy"
            echo "🔧 Try this alternative approach:"
            echo "1. Check exact ACL syntax in Tailscale admin console"
            echo "2. Ensure GitHub Actions user is in correct group"
            echo "3. Verify tag owner field includes GitHub Actions"
            echo "4. Test with: tailscale ssh ${{ secrets.SSH_HOST }} 'echo test'"
            exit 1
          fi
          
          rm -f /tmp/ssh_key

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed"
            exit 1
          fi

      - name: Notify failure
        if: failure()
        run: echo "::error::Deployment failed!"

  notify:
    needs: [test, security, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Success
        if: needs.test.result == 'success' && needs.security.result == 'success'
        run: echo "✅ All checks passed!"

      - name: Failure
        if: needs.test.result == 'failure' || needs.security.result == 'failure'
        run: echo "❌ Some checks failed!"
