name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5  # ← FIX: v4 → v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check synapse/ tests/ --fix
          ruff format synapse/ tests/

      - name: Run tests
        run: |
          pytest --cov=synapse --cov-report=xml --cov-report=term-missing -v \
            --ignore=tests/test_embeddings_unixcoder.py \
            --ignore=tests/test_chunking_treesitter.py \
            --ignore=tests/test_chunking_treesitter_coverage.py \
            --ignore=tests/test_embeddings_sentence_transformer_coverage.py \
            --ignore=tests/test_embeddings_unixcoder_coverage.py \
            --ignore=tests/test_server_full_coverage.py \
            --ignore=tests/test_embeddings_complete_coverage.py \
            --ignore=tests/test_chunking_treesitter_complete.py \
            --ignore=tests/test_remaining_modules_complete.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5  # ← FIX: v4 → v5 (usa upload-artifact@v4)
        with:
          file: ./coverage.xml
          flags: unittests
        continue-on-error: true  # ← FIX: não falha pipeline se codecov down

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety

      - name: Security scan
        run: bandit -r synapse/ -f json -o bandit-report.json || true

      - name: Dependency check
        run: safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  deploy:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Authenticate with Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            echo "Starting deployment to production server..."
            cd /opt/synapse
            sudo -u synapse git fetch origin main
            sudo -u synapse git reset --hard origin/main
            sudo -u synapse /opt/synapse/venv/bin/pip install -r requirements.txt
            sudo systemctl restart synapse-server
            echo "Service restarted, waiting for startup..."
            sleep 15
            
            # Check service status
            if sudo systemctl is-active --quiet synapse-server; then
              echo "✅ Synapse server is running"
            else
              echo "❌ Synapse server failed to start"
              sudo systemctl status synapse-server
              exit 1
            fi
            
            # Health check with debugging
            echo "Testing health endpoint..."
            for i in {1..5}; do
              if curl -sf http://localhost:8000/health; then
                echo "✅ Health check passed"
                break
              else
                echo "⚠️ Health check attempt $i failed, retrying..."
                sleep 5
              fi
            done
            
            # Final verification
            if curl -sf http://localhost:8000/health; then
              echo "✅ Deployment completed successfully!"
            else
              echo "❌ Health check failed after retries"
              echo "Checking logs..."
              sudo journalctl -u synapse-server --no-pager -n 20
              exit 1
            fi

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed"
            exit 1
          fi

      - name: Notify failure
        if: failure()
        run: echo "::error::Deployment failed!"

  notify:
    needs: [test, security, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Success
        if: needs.test.result == 'success' && needs.security.result == 'success'
        run: echo "✅ All checks passed!"

      - name: Failure
        if: needs.test.result == 'failure' || needs.security.result == 'failure'
        run: echo "❌ Some checks failed!"
