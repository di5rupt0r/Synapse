name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. TEST
  # ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements.txt

      - name: Lint
        run: |
          ruff check synapse/ tests/
          ruff format --check synapse/ tests/

      - name: Run tests
        run: |
          pytest --cov=synapse --cov-report=xml --cov-report=term-missing -v \
            --ignore=tests/test_embeddings_unixcoder.py \
            --ignore=tests/test_chunking_treesitter.py \
            --ignore=tests/test_chunking_treesitter_coverage.py \
            --ignore=tests/test_embeddings_sentence_transformer_coverage.py \
            --ignore=tests/test_embeddings_unixcoder_coverage.py \
            --ignore=tests/test_embeddings_complete_coverage.py \
            --ignore=tests/test_chunking_treesitter_complete.py \
            --ignore=tests/test_remaining_modules_complete.py

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # 2. SECURITY
  # ─────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Security scan
        run: |
          pip install bandit safety
          bandit -r synapse/ -f json -o bandit-report.json || true
          safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ─────────────────────────────────────────────────────────
  # 3. DEPLOY  (main only)
  # ─────────────────────────────────────────────────────────
  deploy:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Authenticate with Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          script: |
            set -euo pipefail

            echo "▶ Pulling latest code..."
            cd /opt/synapse
            sudo -u synapse git fetch origin main
            sudo -u synapse git reset --hard origin/main

            echo "▶ Installing dependencies..."
            sudo -u synapse /opt/synapse/venv/bin/pip install -q -r requirements.txt

            echo "▶ Restarting service..."
            sudo systemctl restart synapse-server

            echo "▶ Waiting for process to bind..."
            sleep 4

            # Fail fast if systemd killed the process
            if ! sudo systemctl is-active --quiet synapse-server; then
              echo "❌ synapse-server failed to start:"
              sudo journalctl -u synapse-server --no-pager -n 50
              exit 1
            fi

            # Fail fast if logs show startup errors
            if sudo journalctl -u synapse-server --no-pager -n 30 \
                | grep -qiE "\b(error|exception|failed|traceback|attributeerror|importerror)\b"; then
              echo "❌ Startup errors detected:"
              sudo journalctl -u synapse-server --no-pager -n 50
              exit 1
            fi

            echo "▶ Health check..."
            for i in {1..8}; do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "✅ /health OK (attempt $i)"
                break
              fi
              [ $i -eq 8 ] && { echo "❌ Health check failed after 8 attempts"; sudo journalctl -u synapse-server --no-pager -n 50; exit 1; }
              echo "  attempt $i/8 — waiting 3s..."
              sleep 3
            done

            echo "✅ Deployment complete"
